# Local run config for Ollama + LiteLLM SDK validation

upstream:
  url: "http://localhost:11434"
  timeout_seconds: 300

deployment:
  mode: "standalone"
  host: "127.0.0.1"
  port: 8090

optimizations:
  - id: "cache"
    type: "cache"
    enabled: true
    config:
      strategies:
        exact:
          enabled: true
          backend: "memory"
          max_size: 10000
          ttl_seconds: 3600
          non_deterministic: "skip"
        # semantic:
        #   enabled: true
        #   similarity_threshold: 0.95
        #   embedding:
        #     backend: "sentence_transformers"
        #     model: "all-MiniLM-L6-v2"
        #   vector_store:
        #     backend: "memory"

  - id: "provider_cache"
    type: "provider_cache"
    enabled: false
    depends_on: ["cache"]
    config: {}

  - id: "routing"
    type: "routing"
    enabled: false
    depends_on: ["provider_cache"]
    config:
      # ML-based model routing (pip install routellm or llmrouter-lib)
      # model_routing:
      #   enabled: true
      #   strong: "gpt-4o"
      #   weak: "gpt-4o-mini"
      #   threshold: 0.5
      #   router_type: "bert"  # bert (offline ML) | mf | smallest_llm | largest_llm
      rules: []

  - id: "compression"
    type: "compression"
    enabled: false
    depends_on: ["cache"]
    config:
      compressor_type: "fusion"
      fusion:
        aggressive: true
        enable_rewind: false

  - id: "budget"
    type: "budget"
    enabled: true
    config:
      max_session_cost_usd: 10.0
      max_turns_per_session: 100
      loop_detection_window: 5

redis:
  enabled: false
  url: "redis://localhost:6379"

metrics:
  enabled: true
  endpoint: "/metrics"
  backend: "postgres"
  postgres_dsn: "postgresql://condense:condense@localhost:5432/condense"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
