version: "3.8"

services:
  condense:
    build: .
    # Modular savings UI is served by the same condense container at /_ui
    ports:
      - "8080:8080"
    volumes:
      - ./${CONDENSE_DOCKER_CONFIG:-condense.docker.postgres.yaml}:/app/condense.yaml:ro
    environment:
      - CONDENSE_CONFIG=/app/condense.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=condense
      - POSTGRES_USER=condense
      - POSTGRES_PASSWORD=condense
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condense -d condense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
