# Docker-first config for persistent Postgres-backed dashboard metrics.
upstream:
  url: "http://host.docker.internal:11434"
  timeout_seconds: 300

deployment:
  mode: "standalone"
  host: "0.0.0.0"
  port: 8080

optimizations:
  - id: "cache"
    type: "cache"
    enabled: true
    config:
      strategies:
        exact:
          enabled: true
          backend: "memory"
          max_size: 10000
          ttl_seconds: 3600
          non_deterministic: "skip"
  - id: "provider_cache"
    type: "provider_cache"
    enabled: false
    depends_on: ["cache"]
    config: {}
  - id: "routing"
    type: "routing"
    enabled: false
    depends_on: ["provider_cache"]
    config:
      rules: []
  - id: "compression"
    type: "compression"
    enabled: false
    depends_on: ["cache"]
    config:
      compressor_type: "fusion"
      fusion:
        aggressive: true
        enable_rewind: false
  - id: "budget"
    type: "budget"
    enabled: true
    config:
      max_session_cost_usd: 10.0
      max_turns_per_session: 100
      loop_detection_window: 5

redis:
  enabled: false
  url: "redis://redis:6379"

metrics:
  enabled: true
  endpoint: "/metrics"
  backend: "postgres"
  postgres_dsn: "postgresql://condense:condense@postgres:5432/condense"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
