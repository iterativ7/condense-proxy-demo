# Gemini benchmark: passthrough (ForwardStep only).

upstream:
  url: "https://generativelanguage.googleapis.com/v1beta"
  timeout_seconds: 300
  api_key_env: "GEMINI_API_KEY"

deployment:
  mode: "standalone"
  host: "127.0.0.1"
  port: 8090

optimizations: []

redis:
  enabled: false
  url: "redis://localhost:6379"

metrics:
  endpoint: "/metrics"
  postgres_dsn: "postgresql://condense:condense@localhost:5432/condense"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
