# Gemini benchmark: full mode + compression.

upstream:
  url: "https://generativelanguage.googleapis.com/v1beta"
  timeout_seconds: 300
  api_key_env: "GEMINI_API_KEY"

deployment:
  mode: "standalone"
  host: "127.0.0.1"
  port: 8090

optimizations:
  - id: "exact_cache"
    type: "cache"
    enabled: true
    config:
      exact:
        enabled: true
        backend: "memory"
        max_size: 10000
        ttl_seconds: 3600
      non_deterministic: "skip"

  - id: "provider_cache"
    type: "provider_cache"
    enabled: true
    depends_on: ["exact_cache"]
    config:
      anthropic:
        inject_cache_control: true
        cache_system_prompt: true
        cache_tools: true
      openai:
        enabled: true
      deepseek:
        enabled: true

  - id: "routing"
    type: "routing"
    enabled: true
    depends_on: ["provider_cache"]
    config:
      rules:
        - condition: "short_messages"
          max_chars: 500
          model: "gemini/gemini-2.5-flash"
        - condition: "no_tools"
          model: "gemini/gemini-2.5-flash"

  - id: "compression"
    type: "compression"
    enabled: true
    depends_on: ["routing"]
    config:
      compressor_type: "fusion"
      fusion:
        aggressive: true
        enable_rewind: false

  - id: "budget"
    type: "budget"
    enabled: true
    depends_on: ["compression"]
    config:
      max_session_cost_usd: 100000.0
      max_turns_per_session: 100000
      loop_detection_window: 5

redis:
  enabled: false
  url: "redis://localhost:6379"

metrics:
  enabled: true
  endpoint: "/metrics"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
