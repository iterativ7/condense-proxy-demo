# Benchmark preset: closest to passthrough — only LiteLLM forward (no optimization steps).
# Restart the proxy with: poetry run condense start --config benchmarks/presets/minimal.yaml --host 127.0.0.1 --port 8080
#
# Baseline URL = upstream OpenAI-compatible chat endpoint, e.g.:
#   Ollama: http://127.0.0.1:11434/v1/chat/completions
# Proxy URL: http://127.0.0.1:8080/v1/chat/completions

upstream:
  url: "http://127.0.0.1:11434"
  timeout_seconds: 300

deployment:
  mode: "standalone"
  host: "127.0.0.1"
  port: 8080

# No optimization entries → pipeline is ForwardStep only (see condense.pipeline.build_pipeline).
optimizations: []

redis:
  enabled: false
  url: "redis://127.0.0.1:6379"

metrics:
  enabled: true
  endpoint: "/metrics"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
