# condense.yaml — Chat preset
# Optimized for conversational chat applications.
# Caching + routing + budget all enabled.

upstream:
  url: "https://api.openai.com/v1"
  timeout_seconds: 300
  # api_key_env: "OPENAI_API_KEY"

deployment:
  mode: "behind-gateway"
  host: "0.0.0.0"
  port: 8080

optimizations:
  - id: "exact_cache"
    type: "cache"
    enabled: true
    config:
      exact:
        enabled: true
        backend: "memory"
        max_size: 10000
        ttl_seconds: 3600
      non_deterministic: "skip"

  - id: "provider_cache"
    type: "provider_cache"
    enabled: true
    depends_on: ["exact_cache"]
    config:
      anthropic:
        inject_cache_control: true
        cache_system_prompt: true
        cache_tools: true
      openai:
        enabled: true
      deepseek:
        enabled: true

  - id: "routing"
    type: "routing"
    enabled: true
    depends_on: ["provider_cache"]
    config:
      rules:
        - condition: "short_messages"
          max_chars: 500
          model: "gpt-4o-mini"
        - condition: "no_tools"
          model: "gpt-4o-mini"

  - id: "budget"
    type: "budget"
    enabled: true
    config:
      max_session_cost_usd: 5.0
      max_turns_per_session: 50
      loop_detection_window: 5

redis:
  enabled: false
  url: "redis://localhost:6379"

metrics:
  enabled: true
  endpoint: "/metrics"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
