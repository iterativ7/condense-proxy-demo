# condense.yaml — Default configuration
# See: https://github.com/condense-ai/condense

upstream:
  url: "https://api.openai.com/v1"
  timeout_seconds: 300
  # api_key_env: "OPENAI_API_KEY"

deployment:
  mode: "behind-gateway"
  host: "0.0.0.0"
  port: 8080

optimizations:
  - id: "cache"
    type: "cache"
    enabled: true
    config:
      strategies:
        exact:
          enabled: true
          backend: "memory"        # "memory" | "redis" | any registered
          max_size: 10000
          ttl_seconds: 3600
          non_deterministic: "skip"
        # Semantic cache — similarity-based lookup (pip install sentence-transformers)
        # semantic:
        #   enabled: true
        #   similarity_threshold: 0.95
        #   max_entries: 10000
        #   ttl_seconds: 3600
        #   max_conversation_turns: 3
        #   skip_tool_requests: true
        #   embedding:
        #     backend: "sentence_transformers"
        #     model: "all-MiniLM-L6-v2"
        #   vector_store:
        #     backend: "memory"

  - id: "provider_cache"
    type: "provider_cache"
    enabled: true
    depends_on: ["cache"]
    config:
      anthropic:
        inject_cache_control: true
        cache_system_prompt: true
        cache_tools: true
      openai:
        enabled: true
      deepseek:
        enabled: true

  - id: "routing"
    type: "routing"
    enabled: false
    depends_on: ["provider_cache"]
    config:
      # ML-based model routing — routes queries to strong or weak models
      # based on complexity. Two backends available:
      #   RouteLLM (pip install routellm): bert, mf, causal_llm, sw_ranking
      #   LLMRouter (pip install llmrouter-lib): smallest_llm, largest_llm
      # model_routing:
      #   enabled: true
      #   strong: "gpt-4o"
      #   weak: "gpt-4o-mini"
      #   threshold: 0.5
      #   router_type: "bert"  # bert (offline ML) | mf | smallest_llm | largest_llm

      # Rule-based routing (no extra dependencies required)
      rules:
        - condition: "short_messages"
          max_chars: 500
          model: "gpt-4o-mini"
        - condition: "no_tools"
          model: "gpt-4o-mini"

  - id: "compression"
    type: "compression"
    enabled: false
    depends_on: ["cache"]
    config:
      # Choose backend: "fusion" (code/JSON) or "llmlingua" (natural language)
      compressor_type: "fusion"
      fusion:
        aggressive: true
        enable_rewind: false
      # llmlingua:
      #   model_name: "microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank"
      #   rate: 0.5
      #   use_llmlingua2: true
      #   device: "cpu"

  - id: "budget"
    type: "budget"
    enabled: true
    config:
      max_session_cost_usd: 10.0
      max_turns_per_session: 100
      loop_detection_window: 5

redis:
  enabled: false
  url: "redis://localhost:6379"
  # password_env: "REDIS_PASSWORD"

metrics:
  enabled: true
  endpoint: "/metrics"
  backend: "sqlite"
  sqlite_path: ".condense/metrics.sqlite3"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
