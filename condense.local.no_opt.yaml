# Local run config for Ollama with no optimizations (control run)

upstream:
  url: "http://localhost:11434"
  timeout_seconds: 300

deployment:
  mode: "standalone"
  host: "127.0.0.1"
  port: 8091

optimizations: []

redis:
  enabled: false
  url: "redis://localhost:6379"

metrics:
  enabled: true
  endpoint: "/metrics"

headers:
  add_savings_headers: true

failsafe:
  on_error: "passthrough"
  circuit_breaker:
    threshold: 5
    recovery_seconds: 30
